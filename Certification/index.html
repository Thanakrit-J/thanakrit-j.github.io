<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบประกาศนียบัตร</title>

    <style>
        body{
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
            text-align:center;
            padding:50px 20px;
        }

        h1{
            margin-bottom:40px;
        }

        .card{
            display:block;
            max-width:600px;
            margin:20px auto;
            padding:25px;
            background:#1e293b;
            color:white;
            text-decoration:none;
            border-radius:15px;
            transition:0.3s;
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

        .card:hover{
            background:#2563eb;
            transform:translateY(-5px);
        }

        .title{
            font-size:22px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .desc{
            color:#cbd5e1;
            font-size:14px;
        }
    </style>
</head>
<body>

<h1>🏆 ใบประกาศนียบัตร</h1>

<a class="card" href="CCF29062569.pdf" target="_blank">
    <div class="title">Certificate #1</div>
    <div class="desc">
        ใบประกาศนียบัตรฉบับที่ 1
    </div>
</a>

<a class="card" href="CCF29062569_0001-ผสาน.pdf" target="_blank">
    <div class="title">Certificate #2</div>
    <div class="desc">
        ใบประกาศนียบัตรฉบับที่ 2 (รวมหน้า-หลังแล้ว)
    </div>
</a>

<a class="card" href="CCF29062569_0003.pdf" target="_blank">
    <div class="title">Certificate #3</div>
    <div class="desc">
        ใบประกาศนียบัตรฉบับที่ 3
    </div>
</a>

</body>
</html>
